unbind r
unbind n
bind r source-file ~/.tmux.conf
# bind-key K confirm-before -p "Kill session? (y/n)" kill-session
bind-key K kill-session

set -g prefix C-f
set -g mouse on
set -g base-index 1
setw -g pane-base-index 1
set-option -g status-position bottom
set-option -g detach-on-destroy off 
set -g status-justify left

bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Set new panes to open in current directory
bind c new-window -c "#{pane_current_path}"
bind '"' split-window -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'christoomey/vim-tmux-navigator'

set -g @plugin 'Nybkox/tmux-kanagawa'
set -g @kanagawa-ignore-window-colors true
# # available plugins: battery, cpu-usage, git, gpu-usage, ram-usage, tmux-ram-usage, network, network-bandwidth, network-ping, ssh-session, attached-clients, network-vpn, weather, time, mpc, spotify-tui, krbtgt, playerctl, kubernetes-context, synchronize-panes
set -g @kanagawa-plugins "cpu-usage ram-usage"
set -g @kanagawa-continuum-mode countdown


set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-open'

# set -g @plugin 'omerxx/tmux-floax'

# ---------------------------
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @continuum-restore 'on'


set -g @plugin 'sainnhe/tmux-fzf'
bind-key "s" run-shell -b "~/.tmux/plugins/tmux-fzf/scripts/session.sh switch"
set -g @tmux-fzf-options '-p -w 62% -h 38% -m'
bind-key N command-prompt -p "Session name:" "new-session -s '%%'"
bind-key C command-prompt -p "Window name:" "new-window -s '%%'"

set -g @plugin 'christoomey/vim-tmux-navigator'

bind A display-popup -w 50% -h 50% -E "btop"
bind v display-popup -d "#{pane_current_path}" -w 90% -h 90% -E "jjui"
bind g display-popup -d "#{pane_current_path}" \
    -w 75% -h 75% \
    -b rounded \
    -s "fg=#7E9CD8" \
    -E "tmux new-session -A -s temp"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'

